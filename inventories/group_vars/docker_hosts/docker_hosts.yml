# inventories/group_vars/docker_hosts/docker_hosts.yml

docker_data_root: /home/docker-data
immich_compose_base: /home/admin/immich
immich_timezone: "America/New_York"

immich_version: "v2.7.5"   # pin after first stable deploy

apt_packages:
  - nfs-common

immich_nfs_mounts:
  - src: "{{ nfs_server_ip }}:/mnt/atl/immich"
    path: /mnt/nfs/immich/uploads
    opts: "rw,nfsvers=4,hard,intr"
  - src: "{{ nfs_server_ip }}:/mnt/atl/images"
    path: /mnt/nfs/images
    opts: "ro,nfsvers=4,hard,intr"
  - src: "{{ nfs_server_ip }}:/mnt/atl/home/brian"
    path: /mnt/nfs/brian
    opts: "ro,nfsvers=4,hard,intr"
