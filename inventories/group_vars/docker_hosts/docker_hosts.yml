# inventories/group_vars/docker_hosts/docker_hosts.yml

docker_data_root: /home/docker-data
immich_compose_base: /home/docker-data/compose/immich

immich_version: "release"   # pin to e.g. v1.132.3 after first stable deploy

immich_nfs_mounts:
  - src: "{{ nfs_server_ip }}:/mnt/atl/images"
    path: /mnt/nfs/images
    opts: "ro,nfsvers=4,hard,intr"
  - src: "{{ nfs_server_ip }}:/mnt/atl/immich/ted"
    path: /mnt/nfs/immich/ted
    opts: "rw,nfsvers=4,hard,intr"
  - src: "{{ nfs_server_ip }}:/mnt/atl/immich/sally"
    path: /mnt/nfs/immich/sally
    opts: "rw,nfsvers=4,hard,intr"