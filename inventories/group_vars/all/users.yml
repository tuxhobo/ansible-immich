# inventories/group_vars/all/users.yml

immich_users:
  - username: ted
    email: ted@lalalandus.com
    role: admin

  - username: sally
    email: sally@lalalandus.com
    role: user

  - username: brian
    email: brian@lalalandus.com
    role: user

# Service accounts — not real people, used to own shared libraries.
immich_service_accounts:
  - username: immich-archive
    role: user
    note: "Owns historical archive library. Partner-shared to all users."

# External libraries — indexed in place, files never moved.
# container_path is the mount path as seen inside the immich-server container.
# partner_share lists the usernames who can see this library.
immich_external_libraries:
  - owner: immich-archive
    container_path: /usr/src/app/external-library/archive
    label: "Historical Archive"
    partner_share:
      - ted
      - sally
      - brian

  - owner: brian
    container_path: /usr/src/app/external-library/brian
    label: "Brian's Library"
    partner_share:
      - ted
      - sally
