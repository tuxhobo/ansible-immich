[defaults]
remote_user          = ansible
private_key_file     = /home/ted/.ssh/ansible_pbs_key
inventory            = inventories
roles_path           = roles
collections_path     = ./collections:~/.ansible/collections:/usr/share/ansible/collections:/usr/lib/python3/dist-packages/ansible_collections
log_path             = /tmp/ansible.log
vault_password_file  = ~/.ansible/.vault_pass_lldap

host_key_checking    = True
retry_files_enabled  = False
deprecation_warnings = False
interpreter_python   = auto_silent

stdout_callback      = default
result_format        = default
bin_ansible_callbacks = True
#callbacks_enabled    = timer, profile_tasks
timeout              = 30
forks                = 10

[inventory]
enable_plugins = host_list, script, auto, yaml, ini

[privilege_escalation]
become           = False
become_method    = sudo
become_ask_pass  = False
become_flags     = -H -S -E

[ssh_connection]
pipelining = true
ssh_args   = -o ControlMaster=auto -o ControlPersist=60s
