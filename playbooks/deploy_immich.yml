---
# playbooks/deploy_immich.yml
#
# Deploys the Immich photo management stack on the docker host.
# Assumes deploy_immich_data.yml has already run successfully (TrueNAS
# datasets, NFS exports, and immich user on TrueNAS are prerequisites).
#
# Roles run in order:
#   1. apt_packages      — install required system packages (nfs-common, etc.)
#   2. nfs_client        — verify + mount NFS shares, write fstab
#   3. linux_user        — create immich user/group on the Docker host (UID/GID 9123)
#   4. immich_config     — directory layout, .env, docker-compose.yml, compose up
#   5. immich_smoke_test — post-deploy assertions; fail fast on any failure
#
# Usage:
#   ansible-playbook playbooks/deploy_immich.yml              # full run
#   ansible-playbook playbooks/deploy_immich.yml --tags apt_packages
#   ansible-playbook playbooks/deploy_immich.yml --tags nfs_client
#   ansible-playbook playbooks/deploy_immich.yml --tags linux_user
#   ansible-playbook playbooks/deploy_immich.yml --tags immich_config
#   ansible-playbook playbooks/deploy_immich.yml --tags smoke_test

- name: Deploy Immich on docker
  hosts: docker_hosts
  gather_facts: true
  become: true

  roles:
    - role: apt_packages
      tags: apt_packages

    - role: nfs_client
      tags: nfs_client

    - role: linux_user
      tags: linux_user

    - role: immich_config
      tags: immich_config

    - role: immich_smoke_test
      tags: smoke_test
