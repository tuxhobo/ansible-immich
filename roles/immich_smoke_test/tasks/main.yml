---
# roles/immich_smoke_test/tasks/main.yml
#
# Post-deploy assertions. All tasks are read-only. None make changes.
# Any failure here means the deployment is not healthy — investigate before use.
#
# Checks:
#   1. All four containers are running (not restarting).
#   2. Postgres is accepting connections.
#   3. Immich HTTP endpoint returns 200 or 302.
#   4. Immich has written its expected directory structure to the NFS upload mount.
#      This confirms the mount is writable by the immich user end-to-end.
#      Immich creates these directories during startup before serving HTTP,
#      so if check 3 passed, these will exist.
#   5. NFS archive mount rejects a write (read-only confirmed).

- name: Get running container states
  ansible.builtin.command:
    cmd: >
      docker compose -f {{ immich_compose_base }}/docker-compose.yml
      ps --format json
  register: compose_ps
  changed_when: false

# docker compose ps --format json emits one JSON object per line (NDJSON),
# not a JSON array. Split stdout into lines and parse each line individually.
- name: Assert all Immich containers are running
  ansible.builtin.assert:
    that:
      - >
        compose_ps.stdout_lines
        | map('from_json')
        | selectattr('Name', 'equalto', item)
        | selectattr('State', 'equalto', 'running')
        | list | length == 1
    fail_msg: "Container {{ item }} is not in running state."
    success_msg: "Container {{ item }} is running."
  loop:
    - immich_server
    - immich_machine_learning
    - immich_postgres
    - immich_redis

- name: Assert Postgres is accepting connections
  ansible.builtin.command:
    cmd: docker exec immich_postgres pg_isready
  register: pg_ready
  changed_when: false
  failed_when: pg_ready.rc != 0

# Use curl — uri module runs on the control node, not the target host.
- name: Assert Immich HTTP endpoint is reachable
  ansible.builtin.command:
    cmd: "curl -sf -o /dev/null -w '%{http_code}' http://localhost:{{ immich_server_port }}"
  register: http_check
  changed_when: false
  failed_when: http_check.stdout not in ['200', '302']

# Immich creates these directories during startup before serving HTTP.
# Their presence confirms the NFS upload mount is writable by the immich
# container user (UID 9123) end-to-end. No synthetic write needed —
# this tests the actual workload path.
- name: Assert Immich upload directory structure exists on NFS mount
  ansible.builtin.stat:
    path: "/mnt/nfs/immich/uploads/{{ item }}"
  register: immich_dir_check
  failed_when: not immich_dir_check.stat.exists
  loop:
    - encoded-video
    - thumbs
    - upload
    - profile

- name: Assert NFS archive mount is read-only
  ansible.builtin.command:
    cmd: "touch /mnt/nfs/images/.ansible_smoke_test"
  register: ro_check
  changed_when: false
  failed_when: ro_check.rc == 0
  # rc != 0 (permission denied) is the expected result — mount is correctly read-only

- name: Print smoke test summary
  ansible.builtin.debug:
    msg:
      - "All containers running:              OK"
      - "Postgres accepting connections:       OK"
      - "Immich HTTP endpoint:                OK ({{ http_check.stdout }})"
      - "Immich upload directory structure:   OK"
      - "NFS archive mount read-only:         OK"
